<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexteriq</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#4f98a3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="brand">Lexteriq</span>
    <span class="version">beta</span>
  </div>

  <!-- NOT LOGGED IN -->
  <div id="view-login" class="view">
    <div class="beta-badge">🔒 Beta Cerrada</div>
    <p class="subtitle">Análisis YouTube potenciado por IA</p>
    <button class="btn-google" id="btn-login">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar con Google
    </button>
    <div class="invite-section">
      <p class="invite-label">¿Tienes código de invitación?</p>
      <div class="invite-input-row">
        <input type="text" id="invite-code" placeholder="LEXTER-XXXX" maxlength="20">
        <button class="btn-invite" id="btn-invite">Activar</button>
      </div>
      <p class="invite-hint" id="invite-msg"></p>
    </div>
  </div>

  <!-- LOGGED IN -->
  <div id="view-dashboard" class="view hidden">
    <div class="user-row">
      <img id="user-avatar" src="" width="32" height="32" style="border-radius:50%">
      <div>
        <div id="user-name" class="user-name"></div>
        <div id="user-email" class="user-email"></div>
      </div>
      <span id="user-plan" class="plan-badge"></span>
    </div>

    <div class="trial-banner hidden" id="trial-banner">
      ⏳ Trial: <span id="trial-days"></span> días restantes
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <span class="stat-num" id="stat-analyses">0</span>
        <span class="stat-lbl">Análisis</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="stat-remaining">50</span>
        <span class="stat-lbl">Restantes</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn-action" id="btn-open-yt">▶ Abrir YouTube</button>
      <button class="btn-action outline" id="btn-upgrade" style="display:none">⬆ Upgrade</button>
    </div>

    <button class="btn-logout" id="btn-logout">Cerrar sesión</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

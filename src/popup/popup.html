<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexteriq</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#4f98a3" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 17l10 5 10-5" stroke="#4f98a3" stroke-width="2" stroke-linejoin="round"/>
          <path d="M2 12l10 5 10-5" stroke="#4f98a3" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">Lexteriq</span>
      </div>
      <div id="user-badge" class="user-badge hidden">
        <img id="user-avatar" src="" alt="" class="user-avatar">
        <span id="user-name" class="user-name"></span>
      </div>
    </header>

    <!-- Estado: No logueado -->
    <div id="view-login" class="view">
      <div class="login-hero">
        <div class="login-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#4f98a3" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5" stroke="#4f98a3" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M2 12l10 5 10-5" stroke="#4f98a3" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Bienvenido a Lexteriq</h2>
        <p>Analiza videos de YouTube en tiempo real con datos SEO, keywords y métricas de canal.</p>
        <button class="btn-google" id="btn-login">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Conectar con Google
        </button>
      </div>
    </div>

    <!-- Estado: Logueado -->
    <div id="view-main" class="view hidden">
      <!-- Tab nav -->
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="overview">Overview</button>
        <button class="tab-btn" data-tab="keywords">Keywords</button>
        <button class="tab-btn" data-tab="account">Cuenta</button>
      </nav>

      <!-- Tab: Overview -->
      <div class="tab-content active" id="tab-overview">
        <div id="no-video-msg" class="info-msg">
          <span>▶ Abre un video en YouTube para ver el análisis</span>
        </div>
        <div id="video-summary" class="hidden">
          <div class="video-title" id="popup-video-title"></div>
          <a href="#" id="popup-open-video" class="open-link" target="_blank">Ver en YouTube →</a>
          <div class="quick-stats" id="popup-quick-stats"></div>
        </div>
      </div>

      <!-- Tab: Keywords -->
      <div class="tab-content hidden" id="tab-keywords">
        <div class="search-row">
          <input type="text" id="kw-input" placeholder="Buscar ideas de keywords..." class="kw-input">
          <button class="btn-search" id="kw-search-btn">Buscar</button>
        </div>
        <div id="kw-results" class="kw-results">
          <div class="info-msg">Escribe una palabra clave para obtener ideas</div>
        </div>
      </div>

      <!-- Tab: Cuenta -->
      <div class="tab-content hidden" id="tab-account">
        <div class="account-info">
          <img id="account-avatar" src="" alt="" class="account-avatar">
          <div class="account-details">
            <div class="account-name" id="account-name"></div>
            <div class="account-email" id="account-email"></div>
            <div class="account-plan">Plan: <span class="plan-badge">Free</span></div>
          </div>
        </div>
        <button class="btn-signout" id="btn-signout">Cerrar sesión</button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <span>Lexteriq v1.0.0</span>
      <a href="https://lexteriq.com" target="_blank" class="footer-link">lexteriq.com</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
